<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
     <title>MS TECH HUB - ताज़ा न्यूज़, बिहार समाचार और टेक अपडेट्स</title>
<meta name="description" content="MS TECH HUB OFFICAL पर पाएं बिहार की ताज़ा खबरें, क्रिकेट स्कोर, टेक्नोलॉजी और दुनिया भर के समाचार सबसे तेज़।">
<meta name="keywords" content="MS Tech Hub, Bihar News, Cricket Score, Technology, Hindi News, manjit sawasi News, Gopalganj News">
<meta name="author" content="MANJIT SAWASI">

<meta property="og:title" content="MS TECH HUB OFFICAL - ताज़ा खबरें सबसे पहले">
<meta property="og:description" content="बिहार और दुनिया की ताज़ा खबरों के लिए क्लिक करें।">
<meta property="og:image" content="https://manjitsawasi.online/logo.png">

    <style>
        :root { --main-red: #ce1126; --dark-bg: #0d0d0d; --card-bg: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--dark-bg); color: #f0f0f0; padding-bottom: 20px; }
        
        header { background: var(--main-red); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        header h1 { margin: 0; font-size: 18px; font-weight: 800; color: white; text-transform: uppercase; }

        .nav-scroll { display: flex; overflow-x: auto; background: #141414; padding: 10px; gap: 8px; border-bottom: 1px solid #222; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-btn { background: #252525; color: #aaa; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; white-space: nowrap; font-weight: 600; cursor: pointer; }
        .nav-btn.active { background: var(--main-red); color: white; }

        #newsGrid { padding: 12px; display: grid; gap: 10px; max-width: 800px; margin: auto; }

        /* 🚀 स्केलेटन लोडिंग: जब न्यूज़ न हो तब ये दिखेगा */
        .skeleton { height: 80px; background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 10px; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        .news-card { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #222; animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .source-tag { font-size: 10px; color: var(--main-red); font-weight: bold; margin-bottom: 6px; display: block; }
        .news-title { margin: 0; font-size: 15px; line-height: 1.4; color: #ffffff; }
        .news-title a { text-decoration: none; color: inherit; }
        .news-footer { font-size: 10px; color: #666; margin-top: 10px; border-top: 1px solid #252525; padding-top: 8px; display: flex; justify-content: space-between; }

        .refresh-float { position: fixed; bottom: 20px; right: 20px; background: var(--main-red); color: white; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 1000; }
    </style>
</head>
<body>

    <header><h1>MS TECH HUB OFFICAL</h1></header>

    <div class="nav-scroll">
        <button class="nav-btn active" onclick="loadNews('world', this)">🌍 दुनिया</button>
        <button class="nav-btn" onclick="loadNews('india', this)">🇮🇳 भारत</button>
        <button class="nav-btn" onclick="loadNews('bihar', this)">🎯 बिहार</button>
        <button class="nav-btn" onclick="loadNews('tech', this)">💻 टेक</button>
        <button class="nav-btn" onclick="loadNews('business', this)">💰 व्यापार</button>
    </div>

    <div id="newsGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>

    <button class="refresh-float" onclick="location.reload()">🔄</button>

    <script>
        const sources = {
            world: "world+news", india: "india+news", bihar: "bihar+news",
            tech: "technology+gadgets", business: "stock+market+india"
        };

        async function loadNews(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            const grid = document.getElementById('newsGrid');
            
            // 1. मेमोरी से डेटा उठाओ
            const cacheKey = 'ms_news_' + cat;
            const cachedHTML = localStorage.getItem(cacheKey);
            if(cachedHTML) grid.innerHTML = cachedHTML;

            const query = sources[cat];
            const feedUrl = `https://news.google.com/rss/search?q=${query}&hl=hi&gl=IN&ceid=IN:hi`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");

                let finalHTML = ""; 
                items.forEach((item, index) => {
                    if(index > 14) return; 
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const pubDate = new Date(item.querySelector("pubDate").textContent);
                    const timeStr = pubDate.toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});

                    finalHTML += `
                        <div class="news-card">
                            <span class="source-tag">${cat.toUpperCase()} NEWS</span>
                            <h3 class="news-title"><a href="${link}" target="_blank">${title}</a></h3>
                            <div class="news-footer"><span>🕒 आज, ${timeStr}</span><span>पढ़ें →</span></div>
                        </div>`;
                });

                grid.innerHTML = finalHTML;
                localStorage.setItem(cacheKey, finalHTML);
            } catch (err) { console.log("Slow connection"); }
        }

        window.onload = () => loadNews('world');
    </script>
</body>
</html>
