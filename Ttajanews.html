<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS TECH HUB | सुपर फ़ास्ट न्यूज़</title>
    <style>
        :root { --red: #ce1126; --bg: #000; --card: #161616; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; }
        
        /* हेडर */
        .header { background: var(--red); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 20px; text-transform: uppercase; }

        /* फ़िल्टर बटन */
        .nav { display: flex; overflow-x: auto; background: #111; padding: 10px; gap: 8px; position: sticky; top: 54px; z-index: 99; }
        .nav::-webkit-scrollbar { display: none; }
        .btn { background: #222; color: #fff; border: 1px solid #333; padding: 8px 15px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .btn.active { background: var(--red); border-color: var(--red); }

        /* न्यूज़ कार्ड्स */
        #news-grid { padding: 10px; display: grid; gap: 12px; max-width: 700px; margin: auto; }
        .news-card { background: var(--card); border-radius: 10px; padding: 15px; border-bottom: 3px solid #333; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-card h3 { margin: 0 0 10px 0; font-size: 16px; line-height: 1.4; }
        .news-card a { color: #fff; text-decoration: none; }
        .news-card .meta { font-size: 11px; color: var(--red); font-weight: bold; display: flex; justify-content: space-between; }
        
        .loader { text-align: center; margin-top: 20px; color: var(--red); }
    </style>
</head>
<body>

<div class="header"><h1>MS TECH HUB OFFICIAL</h1></div>

<div class="nav">
    <button class="btn active" onclick="displayCategory('world', this)">🌍 सब खबरें</button>
    <button class="btn" onclick="displayCategory('india', this)">🇮🇳 भारत</button>
    <button class="btn" onclick="displayCategory('bihar', this)">🎯 बिहार</button>
    <button class="btn" onclick="displayCategory('tech', this)">💻 टेक</button>
    <button class="btn" onclick="displayCategory('cricket', this)">🏏 क्रिकेट</button>
</div>

<div id="news-grid">
    <div class="loader">खबरें लोड हो रही हैं मंजीत भाई...</div>
</div>

<script>
    const topics = {
        world: "world+news", 
        india: "india+news", 
        bihar: "bihar+news+update",
        tech: "technology+gadgets", 
        cricket: "cricket+score+india"
    };

    // Chrome की सुरक्षा के लिए मल्टीपल प्रॉक्सी का बैकअप
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];

    // न्यूज़ डेटा फ़ेच करने वाला फंक्शन
    async function fetchFromRSS(cat) {
        const rssUrl = `https://news.google.com/rss/search?q=${topics[cat]}&hl=hi&gl=IN&ceid=IN:hi`;
        const target = proxies[0] + encodeURIComponent(rssUrl);

        try {
            const res = await fetch(target);
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let html = "";
            items.forEach((item, i) => {
                if(i > 10) return;
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const time = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});
                
                html += `
                <div class="news-card">
                    <div class="meta"><span>${cat.toUpperCase()}</span> <span>🕒 ${time}</span></div>
                    <h3><a href="${link}" target="_blank">${title}</a></h3>
                </div>`;
            });
            
            // डेटा को लोकल स्टोरेज में सेव कर लो ताकि अगली बार इंतज़ार न करना पड़े
            localStorage.setItem('cache_' + cat, html);
            return html;
        } catch (e) {
            console.log("Error loading " + cat);
            return localStorage.getItem('cache_' + cat) || ""; 
        }
    }

    // कैटेगरी दिखाने वाला फंक्शन
    async function displayCategory(cat, btn) {
        const grid = document.getElementById('news-grid');
        
        // बटन का रंग बदलो
        if(btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 1. अगर पुरानी न्यूज़ सेव है, तो पहले वही दिखा दो (Zero Waiting)
        const oldData = localStorage.getItem('cache_' + cat);
        if(oldData) grid.innerHTML = oldData;

        // 2. बैकग्राउंड में ताज़ा न्यूज़ लाओ
        const freshData = await fetchFromRSS(cat);
        if(freshData) grid.innerHTML = freshData;
    }

    // जैसे ही पेज खुलेगा, ये काम शुरू होगा
    window.onload = async () => {
        // सबसे पहले 'world' न्यूज़ दिखाओ
        displayCategory('world');

        // साथ ही साथ बाकी सब कैटेगरी को बैकग्राउंड में लोड कर लो
        ['india', 'bihar', 'tech', 'cricket'].forEach(cat => fetchFromRSS(cat));
    };
</script>

</body>
</html>
