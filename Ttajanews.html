<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS TECH HUB | Ultra Fast</title>
    <style>
        :root { --red: #ce1126; --bg: #050505; --card: #121212; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; }
        
        /* तेज़ हेडर */
        .header { background: var(--red); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        /* कैटेगरी मेनू */
        .nav { display: flex; overflow-x: auto; background: #111; padding: 10px; gap: 10px; position: sticky; top: 50px; z-index: 99; border-bottom: 1px solid #222; }
        .nav::-webkit-scrollbar { display: none; }
        .btn { background: #222; color: #ccc; border: 1px solid #333; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* न्यूज़ एरिया */
        #news-grid { padding: 12px; max-width: 650px; margin: auto; }
        .card { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; transition: 0.2s; }
        .card h3 { margin: 0; font-size: 16px; line-height: 1.5; color: #eee; }
        .card a { text-decoration: none; color: inherit; }
        .card .time { font-size: 11px; color: var(--red); margin-bottom: 8px; display: block; font-weight: bold; }

        /* जब न्यूज़ लोड हो रही हो (Skeleton) */
        .skeleton { height: 80px; background: #1a1a1a; margin-bottom: 15px; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">MS TECH HUB OFFICIAL</div>

<div class="nav">
    <button class="btn active" onclick="loadNews('world', this)">🌍 वर्ल्ड</button>
    <button class="btn" onclick="loadNews('india', this)">🇮🇳 भारत</button>
    <button class="btn" onclick="loadNews('bihar', this)">🎯 बिहार</button>
    <button class="btn" onclick="loadNews('tech', this)">💻 टेक</button>
    <button class="btn" onclick="loadNews('cricket', this)">🏏 क्रिकेट</button>
</div>

<div id="news-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</div>

<script>
    const topics = {
        world: "world+news", india: "india+news", bihar: "bihar+news",
        tech: "technology+news", cricket: "cricket+india"
    };

    // Chrome में तेज़ चलाने के लिए Cache का इस्तेमाल
    async function loadNews(cat, btn) {
        const grid = document.getElementById('news-grid');
        
        if(btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 1. तुरंत पुराना डेटा दिखाओ (Zero Delay)
        const cached = localStorage.getItem('ms_' + cat);
        if(cached) grid.innerHTML = cached;
        else grid.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';

        // 2. ताज़ा न्यूज़ लाओ (Fast Proxy)
        const rss = `https://news.google.com/rss/search?q=${topics[cat]}&hl=hi&gl=IN&ceid=IN:hi`;
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`;

        try {
            const res = await fetch(proxy);
            if(!res.ok) throw new Error();
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");

            let html = "";
            items.forEach((item, i) => {
                if(i > 10) return;
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const date = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});

                html += `<div class="card">
                            <span class="time">🕒 ${date}</span>
                            <h3><a href="${link}" target="_blank">${title}</a></h3>
                         </div>`;
            });

            grid.innerHTML = html;
            localStorage.setItem('ms_' + cat, html); // फ्यूचर के लिए सेव
        } catch (e) {
            console.log("Slow connection...");
        }
    }

    // ऑटो स्टार्ट
    window.onload = () => loadNews('world');
</script>

</body>
</html>
