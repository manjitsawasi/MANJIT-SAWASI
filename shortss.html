<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manjit Sawasi - Pro Tech</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 10px; }

        /* Back Button - Teer */
        .back-nav { position: fixed; top: 15px; left: 15px; z-index: 1000; }
        .back-nav a { color: #ffffff; text-decoration: none; font-size: 28px; font-weight: bold; }

        .header { text-align: center; padding: 40px 0 10px; font-size: 18px; color: #eb2f06; font-weight: bold; }

        /* YouTube Grid */
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .video-card { display: flex; flex-direction: column; gap: 5px; }

        .thumbnail-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        /* Isse video bahar nahi bhagega */
        .thumbnail-box iframe { width: 100%; height: 100%; border: none; }

        .video-title { font-size: 11px; color: #f1f1f1; line-height: 1.3; height: 30px; overflow: hidden; padding: 0 2px; }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">←</a></div>
    <div class="header">MANJIT TECH PORTAL</div>

    <div class="video-grid">
        <div class="video-card">
            <div class="thumbnail-box">
                <iframe src="https://www.youtube.com/embed/alHxJf-vyFw?rel=0&modestbranding=1" allowfullscreen></iframe>
            </div>
            <div class="video-title">वेबसाइट बनाने का सही तरीका</div>
        </div>

        <div class="video-card">
            <div class="thumbnail-box">
                <iframe src="https://www.youtube.com/embed/fv73dGlh_Zk?rel=0&modestbranding=1" allowfullscreen></iframe>
            </div>
            <div class="video-title">बिहार बोर्ड ताज़ा खबर</div>
        </div>

        <div class="video-card">
            <div class="thumbnail-box">
                <iframe src="https://www.youtube.com/embed/akG-8b6rjjE?rel=0&modestbranding=1" allowfullscreen></iframe>
            </div>
            <div class="video-title">आधार कार्ड नया अपडेट 2026</div>
        </div>

        <div class="video-card">
            <div class="thumbnail-box">
                <iframe src="https://www.youtube.com/embed/VmxAyjm9mjc?rel=0&modestbranding=1" allowfullscreen></iframe>
            </div>
            <div class="video-title">बैंक DBT लिंक कैसे करें</div>
        </div>
    </div>

    <script>
        function playVideo(url, type) {
            var elem = document.getElementById("cinemaMode");
            document.getElementById("cinemaFrame").src = url + "?autoplay=1&rel=0";
            elem.style.display = "block";

            // Fullscreen request
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }

            // SIRF LONG VIDEO ke liye orientation badlega
            if (type === 'long') {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(e => console.log("Rotate not supported"));
                }
            } else {
                // Shorts ke liye hamesha seedha (Portrait) rahega
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('portrait').catch(e => console.log("Rotate not supported"));
                }
            }
        }

        function closeFull() {
            document.getElementById("cinemaMode").style.display = "none";
            document.getElementById("cinemaFrame").src = "";
            if (document.exitFullscreen) { document.exitFullscreen(); }
            // Close karne par wapas portrait mode
            if (screen.orientation && screen.orientation.unlock) { screen.orientation.unlock(); }
        }
    </script>
</body>
</html>
