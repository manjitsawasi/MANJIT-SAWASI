<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Tech - Shorts Portal</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }

        /* Back Button */
        .back-nav { position: fixed; top: 15px; left: 15px; z-index: 1000; }
        .back-nav a { color: #ffffff; text-decoration: none; font-size: 28px; font-weight: bold; }

        .header { text-align: center; padding: 45px 0 15px; font-size: 20px; color: #eb2f06; font-weight: bold; text-transform: uppercase; }

        /* Shorts Grid (2 in a row) */
        .shorts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .short-card { display: flex; flex-direction: column; cursor: pointer; transition: 0.3s; }
        .short-card:active { transform: scale(0.95); }

        /* Thumbnail - Shorts Ratio (9:16) */
        .thumb-box { 
            width: 100%; 
            aspect-ratio: 9/16; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333; 
            position: relative;
        }

        /* Iframe Control */
        .thumb-box iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        .video-title { font-size: 12px; color: #f1f1f1; padding: 8px 5px; text-align: center; font-weight: 500; }

        /* Full Screen Shorts Player */
        .cinema-mode { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #000; 
            z-index: 20000; 
        }
        .cinema-mode iframe { width: 100%; height: 100%; border: none; }
        
        .close-btn { 
            position: absolute; 
            top: 25px; right: 20px; 
            background: rgba(235, 47, 6, 0.9); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            z-index: 20001; 
        }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">←</a></div>
    <div class="header">LATEST SHORTS</div>

    <div class="shorts-grid">
        <div class="short-card" onclick="openShort('https://www.youtube.com/embed/peE4in7xzJs')">
            <div class="thumb-box">
                <iframe src="https://www.youtube.com/embed/peE4in7xzJs?modestbranding=1&rel=0"></iframe>
            </div>
            <div class="video-title">Republic Day Special</div>
        </div>

        <div class="short-card" onclick="openShort('https://www.youtube.com/embed/XcAewf1cEzM')">
            <div class="thumb-box">
                <iframe src="https://www.youtube.com/embed/XcAewf1cEzM?modestbranding=1&rel=0"></iframe>
            </div>
            <div class="video-title">New Tech Short</div>
        </div>
    </div>

    <div id="cinemaMode" class="cinema-mode">
        <div class="close-btn" onclick="closeShort()">बंद करें ×</div>
        <iframe id="cinemaFrame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        function openShort(url) {
            var player = document.getElementById("cinemaMode");
            var frame = document.getElementById("cinemaFrame");
            // Autoplay and No-Related Videos
            frame.src = url + "?autoplay=1&rel=0&showinfo=0&iv_load_policy=3";
            player.style.display = "block";

            // Fullscreen for best experience
            if (player.requestFullscreen) { player.requestFullscreen(); }
            else if (player.webkitRequestFullscreen) { player.webkitRequestFullscreen(); }
        }

        function closeShort() {
            document.getElementById("cinemaMode").style.display = "none";
            document.getElementById("cinemaFrame").src = "";
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }
    </script>
</body>
</html>
